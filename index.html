<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>КиноНавигатор</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
padding:15px;
}

h2{
margin-bottom:10px;
}

/* верхняя панель */

.top{
display:flex;
gap:10px;
}

#search{
flex:1;
padding:10px;
border-radius:10px;
border:none;
font-size:16px;
}

/* кнопки */

button{
padding:10px 14px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
}

#searchBtn{
background:#2563eb;
color:white;
}

#viewBtn{
background:#1e293b;
color:white;
}

/* результаты */

#results{
margin-top:20px;
}

/* карточка */

.card{
background:#1e293b;
padding:10px;
border-radius:12px;
margin-top:15px;
}

.card img{
width:100%;
border-radius:10px;
}

.card h3{
margin:8px 0 5px;
}

.card p{
font-size:14px;
color:#cbd5e1;
}

/* кнопка кинопоиска */

.kp{
display:inline-block;
margin-top:10px;
background:#ffcc00;
color:black;
padding:6px 10px;
border-radius:8px;
text-decoration:none;
}

/* сетка */

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

.grid .card{
padding:5px;
}

.grid .card h3,
.grid .card p,
.grid .card a{
display:none;
}

.grid .card img{
height:200px;
object-fit:cover;
}

</style>
</head>

<body>

<h2>🎬 КиноНавигатор</h2>

<div class="top">

<input id="search" placeholder="Введите фильм">

<button id="searchBtn">🔍</button>

<button id="viewBtn">☷</button>

</div>

<div id="results"></div>

<script>

const TOKEN = "eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiJkYTVlOTIzY2JmM2JmYjA3ZmQ4ZTQ5NmM2NDBkODNkMyIsIm5iZiI6MTc3MTI1NTAyNi4yMTQwMDAyLCJzdWIiOiI2OTkzMzRmMjA0NTBhYTczZTkwNjU4MTgiLCJzY29wZXMiOlsiYXBpX3JlYWQiXSwidmVyc2lvbiI6MX0.Nl0dl9ZINhKJ6CQCgqXLnflUavTA55j6Pn0XpDiuG-k";


let grid=false;

Telegram.WebApp.ready();
Telegram.WebApp.expand();

/* переключение вида */

document.getElementById("viewBtn").onclick=()=>{

grid=!grid;

const results=document.getElementById("results");

if(grid){
results.classList.add("grid");
document.getElementById("viewBtn").innerText="≣";
}else{
results.classList.remove("grid");
document.getElementById("viewBtn").innerText="☷";
}

};

/* поиск */

document.getElementById("searchBtn").onclick=search;

document.getElementById("search").addEventListener("keypress",e=>{
if(e.key==="Enter") search();
});

async function search(){

const query=document.getElementById("search").value.trim();

if(query.length<2){
alert("Введите хотя бы 2 буквы");
return;
}

const results=document.getElementById("results");

results.innerHTML="Поиск...";

try{

const url=`https://api.allorigins.win/raw?url=https://api.themoviedb.org/3/search/multi?query=${encodeURIComponent(query)}&language=ru-RU`;

const res = await fetch(url,{
headers:{
Authorization:`Bearer ${TOKEN}`,
accept:"application/json"
}
});

const data=await res.json();

if(!data.results || data.results.length===0){
results.innerHTML="Ничего не найдено";
return;
}

results.innerHTML="";

data.results.slice(0,10).forEach(movie=>{

const title=movie.title||movie.name||"Без названия";

const poster=movie.poster_path
?`https://image.tmdb.org/t/p/w500${movie.poster_path}`
:"";

const kinopoisk=`https://www.kinopoisk.ru/index.php?kp_query=${encodeURIComponent(title)}`;

const div=document.createElement("div");

div.className="card";

div.innerHTML=`
${poster?`<img src="${poster}">`:""}
<h3>${title}</h3>
⭐ ${movie.vote_average||"—"}
<p>${movie.overview||""}</p>
<a class="kp" target="_blank" href="${kinopoisk}">
🎬 Открыть в Кинопоиске
</a>
`;

results.appendChild(div);

});

}catch(err){

results.innerHTML="Ошибка: "+err;

}

}

</script>

</body>
</html>
