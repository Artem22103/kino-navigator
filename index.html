<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>КиноНавигатор</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
padding:15px;
}

.top{
display:flex;
gap:10px;
align-items:center;
}

.searchBox{
flex:1;
position:relative;
}

.searchBox input{
width:100%;
padding:10px 10px 10px 35px;
border-radius:10px;
border:none;
font-size:16px;
}

.searchIcon{
position:absolute;
left:10px;
top:50%;
transform:translateY(-50%);
}

#viewBtn{
width:42px;
height:42px;
border-radius:50%;
border:none;
cursor:pointer;
background:#1e293b;
color:white;
font-size:18px;
}

#results{
margin-top:15px;
}

.card{
background:#1e293b;
padding:10px;
border-radius:12px;
margin-top:15px;
}

.card img{
width:100%;
border-radius:10px;
}

.kp{
display:inline-block;
margin-top:8px;
background:#ffcc00;
color:black;
padding:6px 10px;
border-radius:8px;
text-decoration:none;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

.grid .card h3,
.grid .card p,
.grid .card a{
display:none;
}

</style>
</head>

<body>

<h2>🎬 КиноНавигатор</h2>

<div class="top">

<div class="searchBox">
<span class="searchIcon">🔍</span>
<input id="search" placeholder="Поиск фильма...">
</div>

<button id="viewBtn">☷</button>

</div>

<div id="results"></div>

<script>

const API_KEY="eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiJkYTVlOTIzY2JmM2JmYjA3ZmQ4ZTQ5NmM2NDBkODNkMyIsIm5iZiI6MTc3MTI1NTAyNi4yMTQwMDAyLCJzdWIiOiI2OTkzMzRmMjA0NTBhYTczZTkwNjU4MTgiLCJzY29wZXMiOlsiYXBpX3JlYWQiXSwidmVyc2lvbiI6MX0.Nl0dl9ZINhKJ6CQCgqXLnflUavTA55j6Pn0XpDiuG-k";

let grid=false;

document.getElementById("viewBtn").onclick=()=>{

grid=!grid;

const results=document.getElementById("results");

if(grid){
results.classList.add("grid");
document.getElementById("viewBtn").innerText="≣";
}else{
results.classList.remove("grid");
document.getElementById("viewBtn").innerText="☷";
}

};

document.getElementById("search").addEventListener("input",()=>{

clearTimeout(window.timer);

window.timer=setTimeout(search,400);

});

async function search(){

const query=document.getElementById("search").value.trim();

if(query.length<2) return;

const url=`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${encodeURIComponent(query)}&language=ru-RU`;

try{

const res=await fetch(url);

const data=await res.json();

const results=document.getElementById("results");

results.innerHTML="";

data.results.slice(0,10).forEach(movie=>{

const title=movie.title||movie.name||"Без названия";

const poster=movie.poster_path
?`https://image.tmdb.org/t/p/w500${movie.poster_path}`
:"";

const kinopoisk=`https://www.kinopoisk.ru/index.php?kp_query=${encodeURIComponent(title)}`;

const div=document.createElement("div");

div.className="card";

div.innerHTML=`
${poster?`<img src="${poster}">`:""}
<h3>${title}</h3>
⭐ ${movie.vote_average||"—"}
<p>${movie.overview||""}</p>
<a class="kp" target="_blank" href="${kinopoisk}">
🎬 Открыть в Кинопоиске
</a>
`;

results.appendChild(div);

});

}catch(e){
console.log(e);
}

}

Telegram.WebApp.expand();

</script>

</body>
</html>
