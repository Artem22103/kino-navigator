<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>КиноНавигатор</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
    background:#0f172a;
    color:white;
    font-family:Arial;
    padding:15px;
}

/* верхняя панель */

.top{
    display:flex;
    align-items:center;
    gap:10px;
}

/* поиск */

.searchBox{
    position:relative;
    flex:1;
}

.searchBox input{
    width:100%;
    padding:10px 10px 10px 35px;
    font-size:16px;
    border-radius:10px;
    border:none;
}

.searchIcon{
    position:absolute;
    left:10px;
    top:50%;
    transform:translateY(-50%);
}

/* кнопка вида */

#viewBtn{
    width:42px;
    height:42px;
    border-radius:50%;
    border:none;
    font-size:18px;
    cursor:pointer;
    background:#1e293b;
    color:white;
}

/* результаты */

#results{
    margin-top:15px;
}

/* карточка */

.card{
    background:#1e293b;
    margin-top:15px;
    padding:10px;
    border-radius:12px;
}

.card img{
    width:100%;
    border-radius:10px;
}

/* сетка */

.grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

.grid .card h3,
.grid .card p,
.grid .card a{
    display:none;
}

.grid .card img{
    height:200px;
    object-fit:cover;
}

/* кнопка кинопоиска */

.kp{
    display:inline-block;
    margin-top:8px;
    background:#ffcc00;
    color:black;
    padding:6px 10px;
    border-radius:8px;
    text-decoration:none;
}

</style>
</head>

<body>

<h2>🎬 КиноНавигатор</h2>

<div class="top">

<div class="searchBox">
<span class="searchIcon">🔍</span>
<input id="search" placeholder="Поиск фильма...">
</div>

<button id="viewBtn">☷</button>

</div>

<div id="results"></div>

<script>

const TOKEN="eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiJkYTVlOTIzY2JmM2JmYjA3ZmQ4ZTQ5NmM2NDBkODNkMyIsIm5iZiI6MTc3MTI1NTAyNi4yMTQwMDAyLCJzdWIiOiI2OTkzMzRmMjA0NTBhYTczZTkwNjU4MTgiLCJzY29wZXMiOlsiYXBpX3JlYWQiXSwidmVyc2lvbiI6MX0.Nl0dl9ZINhKJ6CQCgqXLnflUavTA55j6Pn0XpDiuG-k";

let grid=false;

/* кнопка сетки */

document.getElementById("viewBtn").onclick=()=>{

    grid=!grid;

    const results=document.getElementById("results");

    if(grid){
        results.classList.add("grid");
        document.getElementById("viewBtn").innerText="≣";
    }else{
        results.classList.remove("grid");
        document.getElementById("viewBtn").innerText="☷";
    }

};

/* поиск */

document.getElementById("search").addEventListener("input",()=>{

    clearTimeout(window.timer);

    window.timer=setTimeout(search,500);

});

async function search(){

    const query=document.getElementById("search").value.trim();

    if(query.length<2) return;

    const url=`https://api.themoviedb.org/3/search/multi?query=${encodeURIComponent(query)}&language=ru-RU`;

    const res=await fetch(url,{
        headers:{
            Authorization:`Bearer ${TOKEN}`
        }
    });

    const data=await res.json();

    const results=document.getElementById("results");

    results.innerHTML="";

    if(!data.results) return;

    data.results.slice(0,10).forEach(movie=>{

        const title=movie.title||movie.name||"Без названия";

        const poster=movie.poster_path
        ?`https://image.tmdb.org/t/p/w500${movie.poster_path}`
        :"";

        const kinopoisk=`https://www.kinopoisk.ru/index.php?kp_query=${encodeURIComponent(title)}`;

        const div=document.createElement("div");

        div.className="card";

        div.innerHTML=`
        ${poster ? `<img src="${poster}">` : ""}
        <h3>${title}</h3>
        ⭐ ${movie.vote_average||"—"}
        <p>${movie.overview||""}</p>
        <a class="kp" target="_blank" href="${kinopoisk}">
        🎬 Открыть в Кинопоиске
        </a>
        `;

        results.appendChild(div);

    });

}

Telegram.WebApp.expand();

</script>

</body>
</html>
