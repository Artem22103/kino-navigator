<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>КиноНавигатор</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
    background:#0f172a;
    color:white;
    font-family:Arial;
    padding:15px;
}

/* панель поиска */

.top{
    display:flex;
    gap:10px;
    width:100%;
}

/* поле поиска фиксированное */

#search{
    width:70%;
    padding:10px;
    border-radius:10px;
    border:none;
    font-size:16px;
}

/* кнопка поиска */

#searchBtn{
    width:15%;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-size:16px;
    cursor:pointer;
}

/* кнопка режима */

#viewBtn{
    width:15%;
    border:none;
    border-radius:10px;
    background:#1e293b;
    color:white;
    font-size:18px;
    cursor:pointer;
}

/* результаты */

#results{
    margin-top:20px;
}

/* карточка */

.card{
    background:#1e293b;
    padding:10px;
    border-radius:12px;
    margin-top:15px;
}

.card img{
    width:100%;
    border-radius:10px;
}

/* сетка */

.grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

.grid .card h3,
.grid .card p,
.grid .card a{
    display:none;
}

.kp{
    display:inline-block;
    margin-top:10px;
    background:#ffcc00;
    color:black;
    padding:6px 10px;
    border-radius:8px;
    text-decoration:none;
}

</style>
</head>

<body>

<h2>🎬 КиноНавигатор</h2>

<div class="top">

<input id="search" placeholder="Введите фильм">

<button id="searchBtn">🔍</button>

<button id="viewBtn">☷</button>

</div>

<div id="results"></div>

<script>

const API_KEY="eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiJkYTVlOTIzY2JmM2JmYjA3ZmQ4ZTQ5NmM2NDBkODNkMyIsIm5iZiI6MTc3MTI1NTAyNi4yMTQwMDAyLCJzdWIiOiI2OTkzMzRmMjA0NTBhYTczZTkwNjU4MTgiLCJzY29wZXMiOlsiYXBpX3JlYWQiXSwidmVyc2lvbiI6MX0.Nl0dl9ZINhKJ6CQCgqXLnflUavTA55j6Pn0XpDiuG-k";

let grid=false;

/* переключение вида */

document.getElementById("viewBtn").onclick=()=>{

grid=!grid;

const results=document.getElementById("results");

if(grid){
results.classList.add("grid");
document.getElementById("viewBtn").innerText="≣";
}else{
results.classList.remove("grid");
document.getElementById("viewBtn").innerText="☷";
}

};

/* поиск по кнопке */

document.getElementById("searchBtn").onclick=search;

/* поиск по Enter */

document.getElementById("search").addEventListener("keypress",(e)=>{

if(e.key==="Enter") search();

});

async function search(){

const query=document.getElementById("search").value.trim();

if(query==="") return;

const url=`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${encodeURIComponent(query)}&language=ru-RU`;

const res=await fetch(url);

const data=await res.json();

const results=document.getElementById("results");

results.innerHTML="";

if(!data.results) return;

data.results.slice(0,10).forEach(movie=>{

const title=movie.title||movie.name||"Без названия";

const poster=movie.poster_path
?`https://image.tmdb.org/t/p/w500${movie.poster_path}`
:"";

const kinopoisk=`https://www.kinopoisk.ru/index.php?kp_query=${encodeURIComponent(title)}`;

const div=document.createElement("div");

div.className="card";

div.innerHTML=`
${poster?`<img src="${poster}">`:""}
<h3>${title}</h3>
⭐ ${movie.vote_average||"—"}
<p>${movie.overview||""}</p>
<a class="kp" target="_blank" href="${kinopoisk}">
🎬 Открыть в Кинопоиске
</a>
`;

results.appendChild(div);

});

}

Telegram.WebApp.expand();

</script>

</body>
</html>
