<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>КиноНавигатор</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
    background:#0f172a;
    color:white;
    font-family:Arial;
    padding:15px;
}

/* верхняя панель */

.top{
    display:flex;
    align-items:center;
    gap:10px;
}

/* поле поиска */

.searchBox{
    position:relative;
    flex:1;
}

.searchBox input{
    width:100%;
    padding:10px 10px 10px 35px;
    font-size:16px;
    border-radius:10px;
    border:none;
}

/* иконка поиска */

.searchIcon{
    position:absolute;
    left:10px;
    top:50%;
    transform:translateY(-50%);
}

/* кнопка вида */

#viewBtn{
    width:40px;
    height:40px;
    border-radius:50%;
    border:none;
    font-size:18px;
    cursor:pointer;
}

/* результаты */

#results{
    margin-top:15px;
}

/* карточка */

.card{
    background:#1e293b;
    margin-top:15px;
    padding:10px;
    border-radius:12px;
}

.card img{
    width:100%;
    border-radius:10px;
}

/* сетка */

.grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

.grid .card{
    padding:5px;
}

.grid .card h3,
.grid .card p,
.grid .card a{
    display:none;
}

.grid .card img{
    height:200px;
    object-fit:cover;
}

/* кнопка кинопоиска */

.kp{
    display:inline-block;
    margin-top:8px;
    background:#ffcc00;
    color:black;
    padding:6px 10px;
    border-radius:8px;
    text-decoration:none;
    font-size:14px;
}

</style>
</head>

<body>

<h2>🎬 КиноНавигатор</h2>

<div class="top">

<div class="searchBox">

<span class="searchIcon">🔍</span>

<input id="search" placeholder="Поиск фильма...">

</div>

<button id="viewBtn">📦</button>

</div>

<div id="results"></div>

<script>

const TOKEN = "ТВОЙ_TMDB_BEARER";

let grid=false;

document.getElementById("viewBtn").onclick=()=>{

    grid=!grid;

    const results=document.getElementById("results");

    if(grid){
        results.classList.add("grid");
        document.getElementById("viewBtn").innerText="📃";
    }else{
        results.classList.remove("grid");
        document.getElementById("viewBtn").innerText="📦";
    }

};

/* поиск при вводе */

document.getElementById("search").addEventListener("input",()=>{

    clearTimeout(window.searchTimer);

    window.searchTimer=setTimeout(search,400);

});

async function search(){

    const query=document.getElementById("search").value;

    if(query.length<2) return;

    const res=await fetch(
        `https://api.themoviedb.org/3/search/multi?query=${query}&language=ru-RU`,
        {
            headers:{
                Authorization:`Bearer ${TOKEN}`
            }
        }
    );

    const data=await res.json();

    const results=document.getElementById("results");

    results.innerHTML="";

    data.results.slice(0,10).forEach(movie=>{

        const title=movie.title||movie.name;

        const poster=movie.poster_path
        ?`https://image.tmdb.org/t/p/w500${movie.poster_path}`
        :"";

        const kinopoisk=`https://www.kinopoisk.ru/index.php?kp_query=${title}`;

        const div=document.createElement("div");

        div.className="card";

        div.innerHTML=`
        <img src="${poster}">
        <h3>${title}</h3>
        ⭐ ${movie.vote_average||"—"}
        <p>${movie.overview||""}</p>
        <a class="kp" target="_blank" href="${kinopoisk}">
        🎬 Открыть в Кинопоиске
        </a>
        `;

        results.appendChild(div);

    });

}

Telegram.WebApp.expand();

</script>

</body>
</html>
