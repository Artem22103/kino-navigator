<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>КиноНавигатор</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    background:#0f172a;
    color:white;
    font-family:Arial;
    padding:15px;
}

input {
    width:100%;
    padding:12px;
    font-size:16px;
    border-radius:10px;
    border:none;
}

.card {
    background:#1e293b;
    margin-top:15px;
    padding:10px;
    border-radius:12px;
}

img {
    width:100%;
    border-radius:10px;
}
</style>
</head>

<body>

<h2>🎬 КиноНавигатор</h2>

<input id="search" placeholder="Введите фильм..." />

<div id="results"></div>

<script>

const TOKEN = "eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiJkYTVlOTIzY2JmM2JmYjA3ZmQ4ZTQ5NmM2NDBkODNkMyIsIm5iZiI6MTc3MTI1NTAyNi4yMTQwMDAyLCJzdWIiOiI2OTkzMzRmMjA0NTBhYTczZTkwNjU4MTgiLCJzY29wZXMiOlsiYXBpX3JlYWQiXSwidmVyc2lvbiI6MX0.Nl0dl9ZINhKJ6CQCgqXLnflUavTA55j6Pn0XpDiuG-k";

document.getElementById("search").addEventListener("change", search);

async function search() {

    const query = document.getElementById("search").value;

    const res = await fetch(
        `https://api.themoviedb.org/3/search/multi?query=${query}&language=ru-RU`,
        {
            headers:{
                Authorization:`Bearer ${TOKEN}`
            }
        }
    );

    const data = await res.json();

    const results = document.getElementById("results");
    results.innerHTML = "";

    data.results.slice(0,10).forEach(movie => {

        const title = movie.title || movie.name;
        const poster = movie.poster_path
            ? `https://image.tmdb.org/t/p/w500${movie.poster_path}`
            : "";

        const div = document.createElement("div");
        div.className="card";

        div.innerHTML = `
            <img src="${poster}">
            <h3>${title}</h3>
            ⭐ ${movie.vote_average || "—"}
            <p>${movie.overview || ""}</p>
        `;

        results.appendChild(div);
    });
}

Telegram.WebApp.expand();

</script>

</body>
</html>
